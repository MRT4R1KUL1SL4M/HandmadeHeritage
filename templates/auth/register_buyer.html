{% extends 'base.html' %}
{% block body %}

<style>
  /* -------- MASTERCLASS: ANIMATED & FUNCTIONAL LUXURY BUYER REGISTRATION -------- */
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800;900&family=Hind+Siliguri:wght@500;600;700;800;900&display=swap');

  :root {
    --p-green: #006a4e;
    --p-mint: #10b981;
    --p-gold: #f59e0b;
    --p-dark: #0f172a;
    --p-glass: rgba(255, 255, 255, 0.88);
    --p-border: rgba(15, 23, 42, 0.1);
    --p-shadow: 0 40px 100px rgba(0,0,0,0.1);
  }

  .rx-master-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    background: #fcfaf7;
    position: relative;
    overflow: hidden;
  }

  /* Animated Blobs */
  .blob {
    position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.4;
    animation: blobFloat 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
  }
  .blob-1 { width: 500px; height: 500px; background: var(--p-mint); top: -10%; left: -10%; }
  .blob-2 { width: 400px; height: 400px; background: var(--p-gold); bottom: -5%; right: 10%; animation-delay: -5s; }
  .blob-3 { width: 300px; height: 300px; background: var(--p-green); top: 40%; left: 30%; animation-delay: -10s; }

  @keyframes blobFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(100px, 50px) scale(1.2); }
  }

  .rx-shell { width: 100%; max-width: 820px; position: relative; z-index: 10; }

  .rx-header-box { text-align: center; margin-bottom: 40px; }
  .rx-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 5vw, 48px);
    font-weight: 900;
    color: var(--p-dark);
    margin: 15px 0;
    opacity: 0; transform: translateY(-20px);
    animation: fadeInUp 0.8s forwards 0.2s;
  }

  .rx-main-card {
    background: var(--p-glass);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid var(--p-border);
    border-radius: 35px;
    padding: clamp(30px, 5vw, 60px);
    box-shadow: var(--p-shadow);
    position: relative;
    overflow: hidden;
    opacity: 0; transform: translateY(30px);
    animation: fadeInUp 1s forwards 0.4s;
  }

  /* Moving Light Border Effect */
  .rx-main-card::before {
    content: "";
    position: absolute;
    inset: 0;
    padding: 2px;
    border-radius: 35px;
    background: linear-gradient(135deg, transparent, rgba(0, 106, 78, 0.3), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    animation: borderLight 6s linear infinite;
  }

  @keyframes borderLight { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

  .rx-field-group { margin-bottom: 24px; opacity: 0; transform: translateY(15px); animation: fadeInUp 0.6s forwards; position: relative; }
  .f-1 { animation-delay: 0.6s; }
  .f-2 { animation-delay: 0.7s; }
  .f-3 { animation-delay: 0.8s; }
  .f-4 { animation-delay: 0.9s; }

  .rx-label-flex {
    display: flex; justify-content: space-between; margin-bottom: 8px;
    font-weight: 800; font-size: 13px; color: var(--p-dark);
  }

  .rx-input-lux {
    width: 100%; height: 58px; padding: 0 45px 0 20px;
    border-radius: 18px; border: 1.5px solid rgba(0,0,0,0.06);
    background: #fff; font-size: 15px; font-weight: 600;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .rx-input-lux:focus {
    outline: none; border-color: var(--p-green);
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 15px 35px rgba(0, 106, 78, 0.1);
  }

  .rx-eye-btn {
    position: absolute; right: 15px; top: 38px;
    background: none; border: none; cursor: pointer;
    color: #64748b; padding: 5px; z-index: 5;
    transition: color 0.3s;
  }
  .rx-eye-btn:hover { color: var(--p-green); }

  .rx-meter-lux { height: 6px; background: #eef2f6; border-radius: 10px; margin-top: 10px; overflow: hidden; }
  .rx-meter-bar { height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

  .rx-btn-main {
    width: 100%; height: 64px; border-radius: 20px;
    background: var(--p-dark); color: white;
    font-weight: 900; font-size: 17px; border: none;
    cursor: pointer; position: relative; overflow: hidden;
    transition: all 0.4s ease;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }

  .rx-btn-main:hover:not(:disabled) {
    background: var(--p-green); transform: translateY(-4px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0, 106, 78, 0.3);
  }

  .rx-btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

  .rx-otp-flex { display: flex; gap: 12px; justify-content: center; margin: 30px 0; }
  .rx-otp-box {
    width: 54px; height: 68px; border-radius: 16px;
    border: 2.5px solid #eef2f6; text-align: center;
    font-size: 26px; font-weight: 900;
    transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .rx-otp-box:focus { border-color: var(--p-green); transform: scale(1.2); outline: none; }

  .rx-msg { margin-top: 15px; text-align: center; font-size: 13px; font-weight: 700; border-radius: 12px; padding: 10px; display:none; }
  .rx-msg.bad { display: block; background: rgba(239, 68, 68, 0.1); color: #ef4444; }
  .rx-msg.ok { display: block; background: rgba(16, 185, 129, 0.1); color: #10b981; }

  @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
</style>

<section class="rx-master-wrap">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="rx-shell">
    <div class="rx-header-box">
      <span style="font-weight: 900; letter-spacing: 4px; color: var(--p-green); text-transform: uppercase; font-size: 12px;">The Artisans Collective</span>
      <h1 class="rx-headline">Handmade Heritage</h1>
      <p style="color: #64748b; font-weight: 600;">Join the world of fine craftsmanship.</p>
    </div>

    <div class="rx-main-card">
      <div style="display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 40px;">
        <div id="step1Icon" style="opacity:1; transition: 0.5s;"><i data-lucide="user-plus" color="#006a4e"></i></div>
        <div style="width: 50px; height: 2px; background: #eef2f6;"></div>
        <div id="step2Icon" style="opacity:0.3; transition: 0.5s;"><i data-lucide="mail-check"></i></div>
      </div>

      <div id="buyerPanel">
        <div class="rx-field-group f-1">
          <div class="rx-label-flex"><span>Full Name</span><span style="font-family:'Hind Siliguri';opacity:0.6;">নাম</span></div>
          <input id="b_name" class="rx-input-lux" placeholder="Md. Tarikul Islam" />
        </div>

        <div class="rx-field-group f-2">
          <div class="rx-label-flex"><span>Email Address</span><span style="font-family:'Hind Siliguri';opacity:0.6;">ইমেইল</span></div>
          <input id="b_email" type="email" class="rx-input-lux" placeholder="tarikul@heritage.com" />
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="rx-field-group f-3">
          <div style="position: relative;">
            <div class="rx-label-flex"><span>Password</span><span id="strengthLabel" style="font-size: 11px;">Weak</span></div>
            <input id="b_password" type="password" class="rx-input-lux" placeholder="••••••••" />
            <button type="button" class="rx-eye-btn" onclick="togglePass('b_password')"><i data-lucide="eye" width="18"></i></button>
            <div class="rx-meter-lux"><div id="rxMeterBar" class="rx-meter-bar"></div></div>
          </div>
          <div style="position: relative;">
            <div class="rx-label-flex"><span>Confirm</span><span id="matchLabel" style="font-size: 11px; opacity: 0.5;">—</span></div>
            <input id="b_password2" type="password" class="rx-input-lux" placeholder="••••••••" />
            <button type="button" class="rx-eye-btn" onclick="togglePass('b_password2')"><i data-lucide="eye" width="18"></i></button>
          </div>
        </div>

        <button id="rxRegBtn" class="rx-btn-main f-4" onclick="registerBuyer()">
          <span>Create Account</span>
          <i data-lucide="sparkles" width="18"></i>
        </button>

        <div id="buyerMsg" class="rx-msg"></div>

        <div style="text-align: center; margin-top: 35px; border-top: 1px solid #eef2f6; padding-top: 20px;">
          <a href="/register/seller" style="color: var(--p-green); font-weight: 800; text-decoration: none; font-size: 14px;">Become a Seller (সেলার হোন) →</a>
        </div>
      </div>

      <div id="otpPanel" style="display: none; transform: translateX(50px); opacity: 0;">
        <div style="text-align: center;">
          <h2 style="font-family: 'Playfair Display'; font-size: 30px; margin-bottom: 10px;">Verification Code</h2>
          <p style="font-size: 14px; color: #64748b;">Enter the code sent to <b id="targetEmail"></b></p>
          <div class="rx-otp-flex">
            <input class="rx-otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input class="rx-otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input class="rx-otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input class="rx-otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input class="rx-otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input class="rx-otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
          </div>
          <button id="rxVerifyBtn" class="rx-btn-main" onclick="verifyOtp()">Verify Identity</button>
          
          <div id="otpMsg" class="rx-msg"></div>

          <button id="rxResendBtn" onclick="resendOtp()" style="background: none; border: none; color: var(--p-green); font-weight: 800; margin-top: 25px; cursor: pointer;">Resend OTP</button>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  // Helper for API calls
  async function api(url, data){
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const j = await res.json();
    if(!res.ok) throw new Error(j.error || 'Request failed');
    return j;
  }

  // Password Visibility Toggle
  function togglePass(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  // Animation for Panels
  function showOtp(email) {
    const bPanel = document.getElementById('buyerPanel');
    const oPanel = document.getElementById('otpPanel');
    const s1 = document.getElementById('step1Icon');
    const s2 = document.getElementById('step2Icon');
    document.getElementById('targetEmail').textContent = email;

    bPanel.style.transition = "0.6s cubic-bezier(0.4, 0, 0.2, 1)";
    bPanel.style.transform = "translateX(-50px)";
    bPanel.style.opacity = "0";

    setTimeout(() => {
      bPanel.style.display = "none";
      oPanel.style.display = "block";
      s1.style.opacity = "0.3";
      s2.style.opacity = "1";
      setTimeout(() => {
        oPanel.style.transition = "0.6s cubic-bezier(0.4, 0, 0.2, 1)";
        oPanel.style.transform = "translateX(0)";
        oPanel.style.opacity = "1";
        otpInputs[0].focus();
      }, 50);
    }, 600);
  }

  // Password Strength Logic
  document.getElementById('b_password').addEventListener('input', function(e) {
    let p = e.target.value;
    let bar = document.getElementById('rxMeterBar');
    let lbl = document.getElementById('strengthLabel');
    let s = 0;
    if(p.length >= 6) s = 40;
    if(p.length >= 8 && /[A-Z]/.test(p)) s = 70;
    if(p.length >= 10 && /\d/.test(p)) s = 100;
    bar.style.width = s + '%';
    bar.style.background = s < 50 ? '#ef4444' : s < 80 ? '#f59e0b' : '#10b981';
    lbl.textContent = s < 50 ? 'Weak' : s < 80 ? 'Good' : 'Strong';
  });

  // OTP Focus Logic
  const otpInputs = document.querySelectorAll('.rx-otp-box');
  otpInputs.forEach((input, index) => {
    input.addEventListener('input', () => {
      if (input.value && index < otpInputs.length - 1) otpInputs[index + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && index > 0) otpInputs[index - 1].focus();
    });
  });

  // Main Registration Logic
  async function registerBuyer() {
    const name = document.getElementById('b_name').value.trim();
    const email = document.getElementById('b_email').value.trim();
    const p1 = document.getElementById('b_password').value;
    const p2 = document.getElementById('b_password2').value;
    const msg = document.getElementById('buyerMsg');
    const btn = document.getElementById('rxRegBtn');

    msg.style.display = 'none';

    if(!name || !email || !p1) {
      msg.textContent = "All fields are required."; msg.className = "rx-msg bad";
      msg.style.display = 'block';
      return;
    }
    if(p1 !== p2) {
      msg.textContent = "Passwords do not match."; msg.className = "rx-msg bad";
      msg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = "Creating account...";

    try {
      await api('/api/register', { name, email, password: p1, role: 'buyer' });
      showOtp(email);
    } catch(e) {
      msg.textContent = e.message; msg.className = "rx-msg bad";
      msg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = "<span>Create Account</span> <i data-lucide='sparkles' width='18'></i>";
      lucide.createIcons();
    }
  }

  async function verifyOtp() {
    const email = document.getElementById('b_email').value;
    const code = Array.from(otpInputs).map(i => i.value).join('');
    const msg = document.getElementById('otpMsg');
    const btn = document.getElementById('rxVerifyBtn');

    msg.style.display = 'none';

    if(code.length < 6) {
        msg.textContent = "Please enter the full 6-digit code.";
        msg.className = "rx-msg bad";
        msg.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "Verifying...";

    try {
      await api('/api/verify', { email, otp: code });
      msg.textContent = "Verified! Redirecting...";
      msg.className = "rx-msg ok";
      msg.style.display = 'block';
      setTimeout(() => { window.location.href = '/login'; }, 1500);
    } catch(e) {
      msg.textContent = e.message;
      msg.className = "rx-msg bad";
      msg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Verify Identity";
    }
  }

  // Functional Resend OTP with Cooldown Timer
  let resendCooldown = false;
  async function resendOtp() {
    if(resendCooldown) return;
    
    const email = document.getElementById('b_email').value;
    const btn = document.getElementById('rxResendBtn');
    const msg = document.getElementById('otpMsg');
    
    msg.style.display = 'none';
    btn.disabled = true;

    try {
      await api('/api/resend-otp', { email });
      msg.textContent = "New OTP has been sent to your email.";
      msg.className = "rx-msg ok";
      msg.style.display = 'block';
      
      // Start cooldown timer
      resendCooldown = true;
      let seconds = 30;
      const originalText = btn.innerHTML;
      
      const timer = setInterval(() => {
          seconds--;
          btn.innerHTML = `Resend in ${seconds}s`;
          if (seconds <= 0) {
              clearInterval(timer);
              btn.innerHTML = "Resend OTP";
              btn.disabled = false;
              resendCooldown = false;
          }
      }, 1000);

    } catch(e) {
      msg.textContent = e.message;
      msg.className = "rx-msg bad";
      msg.style.display = 'block';
      btn.disabled = false;
    }
  }

  lucide.createIcons();
</script>

{% endblock %}
