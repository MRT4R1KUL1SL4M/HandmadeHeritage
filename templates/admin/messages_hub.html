{% extends 'admin/admin_base.html' %}
{% block body %}

<div class="hh-msg-hub" data-hh-messages-hub="1">

<style>
  /* ================================================================
     SUPPORT INTERCOM HUB: SOVEREIGN REFINEMENT (v4.3)
     THEME: Luxury Cream, Slate Blue & Sage Green
     ARCH: Multi-Pane Dispatch Terminal with Integrated Logic
     ================================================================ */

  /* --- Terminal Shell --- */
  .hh-msg-shell {
    display: grid; 
    grid-template-columns: 340px 1fr; 
    gap: 25px;
    height: calc(100vh - 180px); 
    min-height: 650px;
    background: transparent;
    position: relative;
    z-index: 5;
  }

  /* --- Left: Registry Ledger --- */
  .hh-msg-panel-left { 
    display: flex; 
    flex-direction: column;
    background: var(--h-surface);
    border: 1.5px solid var(--h-border);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: var(--h-shadow);
  }
  
  .hh-tabs { 
    display: flex; 
    padding: 15px; 
    background: var(--h-surface); 
    gap: 8px;
    border-bottom: 1px solid var(--h-border);
  }
  
  .hh-tab {
    flex: 1; 
    padding: 12px 10px; 
    border-radius: 16px; 
    text-align: center;
    font-size: 10px; 
    font-weight: 950; 
    text-transform: uppercase; 
    letter-spacing: 1.5px;
    text-decoration: none; 
    color: var(--h-slate); 
    transition: 0.4s var(--h-ease);
    border: 1px solid transparent;
  }
  
  .hh-tab.active { 
    background: var(--h-dark); 
    color: #fff; 
    border-color: var(--h-dark);
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15);
  }

  .hh-msg-list { 
    flex: 1; 
    overflow-y: auto; 
    scroll-behavior: smooth;
    padding: 15px;
  }
  
  /* Individual Ledger Cards (Updated Class) */
  .hh-msg-item { 
    padding: 18px 20px; 
    background: var(--h-card);
    border: 1px solid var(--h-border);
    border-radius: 20px;
    margin-bottom: 12px;
    cursor: pointer; 
    transition: 0.4s var(--h-ease);
  }
  
  .hh-msg-item:hover { 
    transform: translateY(-3px); 
    border-color: var(--h-slate);
    box-shadow: 0 12px 25px rgba(0,0,0,0.04);
  }
  
  .hh-msg-item.active { 
    background: var(--h-dark); 
    border-color: var(--h-dark);
    color: #fff;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  }

  .hh-row { display: flex; align-items: center; gap: 15px; }
  .hh-avatar { 
    width: 42px; height: 42px; border-radius: 12px; 
    background: var(--h-bg); display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: var(--h-dark); border: 1px solid var(--h-border);
    flex-shrink: 0;
  }
  .hh-msg-item.active .hh-avatar { background: rgba(255,255,255,0.1); color: #fff; border-color: transparent; }
  
  .hh-col { flex: 1; min-width: 0; }
  .hh-msg-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .hh-msg-title span { font-weight: 800; font-size: 14.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hh-msg-sub { font-size: 10px; opacity: 0.7; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .hh-msg-preview {
    font-size: 12.5px;
    opacity: 0.6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 4px;
    font-weight: 500;
  }
  .hh-pill { background: var(--h-accent); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 950; }

  /* --- Right: Interaction Terminal --- */
  .hh-msg-panel-right { 
    background: var(--h-card); 
    display: flex; 
    flex-direction: column; 
    border: 1.5px solid var(--h-border);
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 40px 100px -30px rgba(0,0,0,0.08);
  }

  .chat-header {
    padding: 25px 40px; 
    border-bottom: 1px solid var(--h-border);
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    background: var(--h-surface);
  }
  
  /* Superadmin/Admin Meta identity Bar */
  #hhSuperMeta {
    padding: 12px 40px;
    background: #f8fafc;
    border-bottom: 1px solid var(--h-border);
    font-size: 11px;
    color: var(--h-slate);
    line-height: 1.6;
  }
  #hhSuperMeta b { color: var(--h-dark); font-weight: 900; }

  .chat-body { 
    flex: 1; 
    overflow-y: auto; 
    padding: 45px; 
    background: #ffffff;
    background-image: radial-gradient(var(--h-border) 1.5px, transparent 1.5px);
    background-size: 32px 32px;
    display: flex; 
    flex-direction: column; 
    gap: 20px;
  }

  /* Message Bubbles */
  .hh-bubble {
    max-width: 70%;
    padding: 15px 22px;
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.6;
    border-radius: 20px;
    position: relative;
    animation: bubbleEntry 0.5s var(--h-ease) backwards;
  }
  
  @keyframes bubbleEntry {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hh-bubble.me {
    align-self: flex-end;
    background: var(--h-dark);
    color: #ffffff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  .hh-bubble:not(.me) {
    align-self: flex-start;
    background: var(--h-surface);
    color: var(--h-dark);
    border: 1px solid var(--h-border);
    border-bottom-left-radius: 4px;
  }

  .hh-bubble-meta {
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 8px;
    opacity: 0.5;
  }

  /* --- Input Terminal --- */
  .chat-footer {
    padding: 30px 40px; 
    border-top: 1px solid var(--h-border);
    background: #ffffff;
    display: flex; 
    gap: 15px; 
    align-items: center;
  }
  
  .hh-input {
    flex: 1; 
    height: 58px; 
    border: 2px solid rgba(0,0,0,0.04); 
    border-radius: 20px;
    padding: 0 25px; 
    font-size: 15.5px; 
    font-weight: 600; 
    outline: none;
    transition: 0.4s var(--h-ease); 
    background: var(--h-bg);
  }
  
  .hh-input:focus { 
    border-color: var(--h-sage); 
    background: #ffffff; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.04); 
    transform: translateY(-2px);
  }

  .hh-send-btn {
    height: 58px; 
    padding: 0 35px; 
    border-radius: 20px; 
    background: var(--h-dark);
    color: #ffffff; 
    font-weight: 950; 
    text-transform: uppercase; 
    letter-spacing: 2px;
    border: none; 
    cursor: pointer; 
    transition: 0.4s var(--h-ease);
    display: flex; 
    align-items: center; 
    gap: 12px;
    font-size: 12px;
  }
  
  .hh-send-btn:hover { 
    background: #000; 
    transform: translateY(-3px) scale(1.02); 
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  }

  /* Custom Scrollbar */
  .hh-msg-list::-webkit-scrollbar,
  .chat-body::-webkit-scrollbar { width: 4px; }
  .hh-msg-list::-webkit-scrollbar-thumb,
  .chat-body::-webkit-scrollbar-thumb { background: var(--h-slate); border-radius: 10px; }
</style>

<div class="hh-msg-shell">
  <!-- Registry (Sidebar Thread List) -->
  <aside class="hh-msg-panel-left">
    <nav class="hh-tabs">
      <a class="hh-tab {% if tab=='buyer_support' %}active{% endif %}" href="/admin/messages?tab=buyer_support">Buyer Assets</a>
      <a class="hh-tab {% if tab=='seller_support' %}active{% endif %}" href="/admin/messages?tab=seller_support">Artisan Manifests</a>
    </nav>
    <div class="hh-msg-list" id="hhThreads">
      <div style="padding:80px 40px; text-align:center; opacity:0.3;">
        <div style="width:24px; height:24px; border:2px solid var(--h-slate); border-top-color:var(--h-dark); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
        <div style="margin-top:20px; font-weight:900; font-size:11px; letter-spacing:2px;">SYNCING_LEDGER...</div>
      </div>
    </div>
  </aside>

  <!-- Interaction Terminal (Main Chat Pane) -->
  <main class="hh-msg-panel-right">
    <div class="chat-header">
      <div>
        <div id="hhChatTitle" style="font-family:'Playfair Display'; font-size:26px; font-weight:900; color:var(--h-dark);">Identity Registry</div>
        <div id="hhChatSub" style="font-size:11px; font-weight:800; color:var(--h-accent); text-transform:uppercase; letter-spacing:1.5px; margin-top:5px;">Awaiting Manifest Selection</div>
      </div>
      <div id="hhReadOnly" style="display:none; padding:8px 20px; background:var(--h-bg); border: 1px solid var(--h-border); border-radius:100px; font-size:10px; font-weight:950; color:var(--h-slate); letter-spacing:2px;">ARCHIVE_PROTOCOL_ENABLED</div>
    </div>

    <!-- Identity metadata bar (Buyer/Seller context) -->
    <div id="hhSuperMeta" style="display:none;"></div>

    <div class="chat-body" id="hhChatBody">
      <div style="margin:auto; text-align:center; opacity:0.15;">
        <i data-lucide="message-square" size="70" stroke-width="1"></i>
        <div style="font-weight:950; letter-spacing:4px; margin-top:25px; font-size:11px; text-transform:uppercase;">Authentication complete. Initialize engaging.</div>
      </div>
    </div>

    <div class="chat-footer">
      <input class="hh-input" id="hhMsgInput" placeholder="Enter administrative response..." autocomplete="off"/>
      <button class="hh-send-btn" id="hhSendBtn">
        <span>Transmit</span> 
        <i data-lucide="send" size="16"></i>
      </button>
    </div>
  </main>
</div>

</div>

<script>
  /* Bridge Global Config */
  window.__HH_VIEWER_ROLE = "admin";
  window.__HH_VIEWER_ID = {{ session.get('admin_id') or 0 }};
  window.__HH_START = "{{ start|default('') }}";
  window.__HH_SELLER_ID = {{ seller_id|default(0) }};
  window.__HH_ORDER_CODE = "{{ order_code|default('') }}";
  window.__HH_OPEN_CONV = {{ open_conv_id|default(0) }};
  window.__HH_TAB = "{{ tab }}";

  (function(){
    function qs(sel){ return document.querySelector(sel); }
    function qsa(sel){ return Array.from(document.querySelectorAll(sel)); }

    const state = {
      threads: [],
      activeId: null,
      viewerRole: null,
      tab: null
    };

    async function jsonFetch(url, opts){
      opts = opts || {};
      if(!opts.credentials) opts.credentials = 'same-origin';
      const res = await fetch(url, opts);
      const ct = res.headers.get('content-type') || '';
      let data = null;
      if(ct.includes('application/json')){
        data = await res.json();
      } else {
        data = await res.text();
      }
      if(!res.ok){
        const msg = (data && data.error) ? data.error : ('HTTP '+res.status);
        throw new Error(msg);
      }
      return data;
    }

    function initials(name){
      name = (name || '').trim();
      if(!name) return '';
      const parts = name.split(/\s+/).filter(Boolean);
      const first = parts[0] ? parts[0][0] : '';
      const last  = parts.length>1 ? parts[parts.length-1][0] : (parts[0][1] || '');
      return (first + last).toUpperCase();
    }

    function colorKey(s){
      s = String(s||'');
      let h=0;
      for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
      return h;
    }

    function isMe(msg){
      const role = state.viewerRole || '';
      const meId = window.__HH_VIEWER_ID || 0;
      return (msg.sender_role === role && Number(msg.sender_id) === Number(meId)) ||
        ((role === 'superadmin' || role === 'admin') && msg.sender_role === 'admin' && Number(msg.sender_id) === Number(meId));
    }

    function renderThreads(){
      const box = qs('#hhThreads');
      if(!box) return;
      box.innerHTML = '';
      state.threads.forEach(t => {
        const item = document.createElement('div');
        item.className = 'hh-msg-item' + (state.activeId === t.id ? ' active' : '');
        item.dataset.id = t.id;
        const pill = t.unread > 0 ? `<span class="hh-pill">${t.unread}</span>` : '';
        item.innerHTML = `
          <div class="hh-row">
            <div class="hh-avatar" data-k="${colorKey(t.title||t.subtitle||t.type||t.id)}">${escapeHtml(initials(t.title||'Chat'))}</div>
            <div class="hh-col">
              <div class="hh-msg-title">
                <span>${escapeHtml(t.title || 'Chat')}</span>
                ${pill}
              </div>
              <div class="hh-msg-sub">${escapeHtml(t.subtitle || (t.type || ''))}</div>
              <div class="hh-msg-preview">${escapeHtml(t.last_message || '')}</div>
            </div>
          </div>
        `;
        item.addEventListener('click', () => openThread(t.id));
        box.appendChild(item);
      });
    }

    function renderHeader(meta){
      const t = qs('#hhChatTitle');
      const s = qs('#hhChatSub');
      if(!t || !s) return;
      t.textContent = meta.title || 'Messages';
      s.textContent = meta.subtitle || '';
    }

    function renderMessages(messages){
      const body = qs('#hhChatBody');
      if(!body) return;
      body.innerHTML = '';
      messages.forEach(m => {
        const wrap = document.createElement('div');
        const me = isMe(m);
        wrap.className = 'hh-bubble' + (me ? ' me' : '');
        wrap.innerHTML = `
          <div>${escapeHtml(m.text || '')}</div>
          <div class="hh-bubble-meta">${escapeHtml(m.created_at || '')}</div>
        `;
        body.appendChild(wrap);
      });
      body.scrollTop = body.scrollHeight;
    }

    async function loadThreads(){
      const url = state.tab ? `/api/messages/threads?tab=${encodeURIComponent(state.tab)}` : '/api/messages/threads';
      const data = await jsonFetch(url);
      state.threads = data.threads || [];
      renderThreads();

      if(state.activeId){
        const found = state.threads.find(x => x.id === state.activeId);
        if(found) renderHeader(found);
      }
    }

    async function openThread(id){
      state.activeId = id;
      try{ localStorage.setItem("HH_LAST_CONV", String(id)); }catch(e){}
      renderThreads();
      const meta = state.threads.find(x => x.id === id) || {};
      renderHeader(meta);

      const data = await jsonFetch(`/api/messages/thread/${id}`);
      renderMessages(data.messages || []);

      const roEl = qs('#hhReadOnly');
      const inputEl = qs('#hhMsgInput');
      const sendEl = qs('#hhSendBtn');
      const isReadOnly = ((state.viewerRole === 'superadmin' || state.viewerRole === 'admin') && (data.type === 'buyer_seller' || data.type === 'order'));
      if(roEl) roEl.style.display = isReadOnly ? 'block' : 'none';
      if(inputEl) inputEl.disabled = isReadOnly;
      if(sendEl) sendEl.disabled = isReadOnly;

      const metaEl = qs('#hhSuperMeta');
      if(metaEl){
        if(data.meta && data.meta.buyer && data.meta.seller){
          const b = data.meta.buyer;
          const s = data.meta.seller;
          metaEl.style.display = 'block';
          metaEl.innerHTML = `<div><b>Buyer</b>: ${escapeHtml(b.name||'')} • ${escapeHtml(b.email||'')} • ID: ${escapeHtml(b.user_id||'')}</div>` +
                             `<div><b>Seller</b>: ${escapeHtml(s.name||'')} • ${escapeHtml(s.email||'')} • ID: ${escapeHtml(s.user_id||'')}</div>`;
        } else {
          metaEl.style.display = 'none';
          metaEl.innerHTML = '';
        }
      }

      loadThreads().catch(()=>{});
      if(window.hhRefreshMsgBadge) window.hhRefreshMsgBadge();
    }

    async function sendMessage(){
      const input = qs('#hhMsgInput');
      if(!input) return;
      const text = (input.value || '').trim();
      if(!text || !state.activeId) return;

      input.value = '';
      try{
        await jsonFetch(`/api/messages/thread/${state.activeId}/send`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({text})
        });
        await openThread(state.activeId);
      } catch(err){
        input.value = text;
      }
    }

    function bindSend(){
      const btn = qs('#hhSendBtn');
      const input = qs('#hhMsgInput');
      if(btn) btn.addEventListener('click', sendMessage);
      if(input) input.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter'){
          e.preventDefault();
          sendMessage();
        }
      });
    }

    async function maybeAutoStart(){
      const start = window.__HH_START || '';
      const sellerId = Number(window.__HH_SELLER_ID || 0);
      const orderCode = window.__HH_ORDER_CODE || '';
      const openConv = Number(window.__HH_OPEN_CONV || 0);

      if(openConv > 0){
        state.activeId = openConv;
        return;
      }

      if(start === 'seller' && sellerId > 0){
        const d = await jsonFetch('/api/messages/start', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({kind:'seller', seller_id: sellerId})
        });
        state.activeId = Number(d.conversation_id || 0) || null;
        return;
      }

      if(start === 'support'){
        const d = await jsonFetch('/api/messages/start', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({kind:'support'})
        });
        state.activeId = Number(d.conversation_id || 0) || null;
        return;
      }

      if(start === 'order' && orderCode && sellerId > 0){
        const d = await jsonFetch('/api/messages/start', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({kind:'order', order_code: orderCode, seller_id: sellerId})
        });
        state.activeId = Number(d.conversation_id || 0) || null;
        return;
      }

      try{
        const last = Number(localStorage.getItem("HH_LAST_CONV") || 0);
        if(!state.activeId && last > 0) state.activeId = last;
      }catch(e){}
    }

    function escapeHtml(s){
      s = (s === null || s === undefined) ? '' : String(s);
      return s.replace(/[&<>"']/g, function(c){
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);
      });
    }

    async function init(){
      const root = qs('[data-hh-messages-hub="1"]');
      if(!root) return;

      state.viewerRole = window.__HH_VIEWER_ROLE || '';
      state.tab = window.__HH_TAB || null;

      bindSend();
      await maybeAutoStart();
      await loadThreads();

      if(state.activeId){
        await openThread(state.activeId);
      } else if(state.threads.length){
        await openThread(state.threads[0].id);
      }

      setInterval(() => {
        loadThreads().catch(()=>{});
      }, 15000);
      
      if(window.lucide) lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

{% endblock %}
