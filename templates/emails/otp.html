<!doctype html>
<html>
  <body style="margin:0;background:#f5f6fa;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;">
    <div style="max-width:620px;margin:0 auto;padding:28px 16px;">
      <div style="background:#ffffff;border-radius:18px;box-shadow:0 12px 34px rgba(0,0,0,.08);overflow:hidden;">
        <div style="padding:18px 18px;border-bottom:1px solid rgba(0,0,0,.06);">
          <div style="font-weight:900;font-size:16px;">Handmade Heritage</div>
          <div style="opacity:.75;font-size:12px;margin-top:4px;">Your verification code</div>
        </div>
        <div style="padding:18px 18px;">
          <h2 style="margin:0 0 10px 0;font-size:18px;">Hi {{ buyer_name }},</h2>
          <p style="margin:0 0 12px 0;line-height:1.6;color:#1f2330;">Use this one-time code to continue:</p>
          <div style="display:inline-block;background:#111827;color:#fff;padding:12px 16px;border-radius:14px;font-weight:950;font-size:20px;letter-spacing:3px;">
            {{ code }}
          </div>
          <p style="margin:14px 0 0 0;opacity:.75;font-size:12px;line-height:1.6;">This code will expire soon. If you didn’t request it, you can ignore this email.</p>
        </div>
      </div>
    </div>
  </body>
</html>
